---
services:
  github-agent:
    # image: docker.io/knucklessg1/github:latest
    build:
      context: . # Debug
      dockerfile: debug.Dockerfile
    container_name: github-agent
    hostname: github-agent
    command: [ "github-agent" ]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: always
    env_file:
      - .env
    environment:
      - "HOST=0.0.0.0"
      - "PORT=9505"
      - "GITHUB_PERSONAL_ACCESS_TOKEN=${GITHUB_ACCESS_TOKEN}"
      - "PROVIDER=openai"
      - "TRANSPORT=stdio"
      - "LLM_BASE_URL=${LLM_BASE_URL:-http://host.docker.internal:1234/v1}"
      - "LLM_API_KEY=${LLM_API_KEY:-llama}"
      - "MODEL_ID=${MODEL_ID:-qwen/qwen3.5-35b-a3b}"
      - "DEBUG=False"
      - "ENABLE_WEB_UI=True"
      - "ENABLE_OTEL=True"
      - "SSL_VERIFY=True"
      - "MAX_TOKENS=16384"
    ports:
      - "9505:9505"
    healthcheck:
      test: [ "CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9505/health')" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
